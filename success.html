<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje enviado — Rafa Aguirre</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #080C12;
    color: #F8FAFC;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
  }
  .container { max-width: 500px; }
  .check {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(26,120,255,0.1);
    border: 2px solid #1A78FF;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.5rem;
    margin-bottom: 16px;
    color: #F8FAFC;
  }
  p {
    color: #6B7280;
    font-weight: 300;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  a {
    display: inline-block;
    background: #1A78FF;
    color: white;
    padding: 14px 32px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  a:hover { background: #1a65d6; }
</style>
</head>
<body>
  <div class="container">
    <div class="check">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1A78FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>¡Mensaje enviado!</h1>
    <p>Gracias por escribirme. Revisaré tu mensaje y te responderé en menos de 24 horas.</p>
    <a href="/">← Volver al inicio</a>
  </div>
</body>
</html>
